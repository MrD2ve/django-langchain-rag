version: '3.8'

services:
  # Our vector database (PostgreSQL + pgvector)
  db:
    image: pgvector/pgvector:pg16
    container_name: rag_db
    environment:
      - POSTGRES_DB=rag_base
      - POSTGRES_USER=postgres_user
      - POSTGRES_PASSWORD=postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Message broker for Celery
  redis:
    image: redis:7-alpine
    container_name: rag_redis
    ports:
      - "6379:6379"

  # Django Back-end
  web:
    build: .
    container_name: rag_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=1
      - DATABASE_URL=postgres://postgres_user:postgres_password@db:5432/rag_base
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

  # Celery worker for background document processing
  worker:
    build: .
    container_name: rag_worker
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://postgres_user:postgres_password@db:5432/rag_base
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  postgres_data: